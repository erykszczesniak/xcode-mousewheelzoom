name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: >
          xcodebuild build
          -project ScrollZoom.xcodeproj
          -scheme ScrollZoom
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: >
          xcodebuild test
          -project ScrollZoom.xcodeproj
          -scheme ScrollZoom
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
