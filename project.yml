name: ScrollZoom
options:
  bundleIdPrefix: com.erykszczesniak
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  ScrollZoom:
    type: application
    platform: macOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: ScrollZoom
        CFBundleDisplayName: ScrollZoom
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Eryk Szczesniak"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erykszczesniak.ScrollZoom
        CLANG_ENABLE_OBJC_ARC: YES
        # Sign with a real development certificate: ad-hoc signatures change
        # on every rebuild, which silently invalidates the TCC Accessibility
        # grant (the toggle stays on but AXIsProcessTrusted returns NO).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: DRY9V64JW9

  ScrollZoomTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
      - path: Sources/Core
      - path: Sources/Edge/NSEvent+SZModifiers.h
      - path: Sources/Edge/NSEvent+SZModifiers.m
      - path: Sources/Edge/SZEventTap.h
      - path: Sources/Edge/SZAccessibility.h
      - path: Sources/Edge/SZKeystrokeSynthesizer.h
      - path: Sources/App/SZZoomController.h
      - path: Sources/App/SZZoomController.m
    settings:
      base:
        CLANG_ENABLE_OBJC_ARC: YES

schemes:
  ScrollZoom:
    build:
      targets:
        ScrollZoom: all
        ScrollZoomTests: [test]
    test:
      targets:
        - ScrollZoomTests
